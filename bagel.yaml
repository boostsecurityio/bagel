version: 1
probes:
  git:
    enabled: true
  ssh:
    enabled: true
  npm:
    enabled: true
  gh:
    enabled: true
  ai_cli:
    enabled: true
    flags:
      # max_file_size: maximum bytes to read from an AI CLI file before skipping it.
      # Prevents scan hangs on large conversation histories. Default: 1048576 (1 MB).
      # max_file_size: 1048576
privacy:
  redact_paths: []
  exclude_env_prefixes: []
output:
  include_file_hashes: false
  include_file_content: false
